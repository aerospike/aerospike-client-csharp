name: Release
run-name: Build release artifacts and generate API docs (v${{ needs.build.outputs.version || 'pending' }})

permissions:
  id-token: write
  contents: write
  pages: write

on:
  push:
    branches: ["master"]
  workflow_dispatch:
    inputs:
      dry-run:
        type: boolean
        required: false
        default: false
        description: 'Dry run: only build and generate API docs (skip sign, deploy, release, and website PR)'

jobs:
  build:
    runs-on: windows-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@df199fb7be9f65074067a9eb93f12bb4c5547cf2 # v2.13.3
      with:
        egress-policy: audit

    - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
    - name: Setup .NET
      uses: actions/setup-dotnet@2016bd2012dba4e32de620c46fe006a3ac9f0602 # v5.0.1
      with:
        dotnet-version: 8.0.x
    - name: Build artifacts
      uses: ./.github/actions/build
      with:
        sgKey: ${{ secrets.SG_KEY }}
    - name: Get version from nupkg
      id: get-version
      shell: pwsh
      run: |
        $nupkg = Get-ChildItem -Path AerospikeClient\bin\Release -Filter "Aerospike.Client.*.nupkg" | Where-Object { $_.Extension -eq ".nupkg" } | Select-Object -First 1
        $version = $nupkg.BaseName -replace '^Aerospike\.Client\.', ''
        echo "version=$version" >> $env:GITHUB_OUTPUT

  sign:
    if: ${{ !inputs.dry-run }}
    needs: build
    uses: aerospike/shared-workflows/.github/workflows/reusable_sign-artifacts.yaml@v3.0.0
    with:
      gh-unsigned-artifacts: AerospikeClient-${{ github.run_number }}
      gh-workflows-ref: v3.0.0
    secrets:
      gpg-private-key: ${{ secrets.GPG_SECRET_KEY }}
      gpg-public-key: ${{ secrets.GPG_PUBLIC_KEY }}
      gpg-key-pass: ${{ secrets.GPG_PASS }}
      es-username: ${{ secrets.ES_USERNAME }}
      es-password: ${{ secrets.ES_PASSWORD }}
      credential_id: ${{ secrets.CREDENTIAL_ID }}
      es-totp_secret: ${{ secrets.ES_TOTP_SECRET }}

  generate-api-docs:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@df199fb7be9f65074067a9eb93f12bb4c5547cf2 # v2.13.3
      with:
        egress-policy: audit

    - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
    - name: Setup .NET
      uses: actions/setup-dotnet@2016bd2012dba4e32de620c46fe006a3ac9f0602 # v5.0.1
      with:
        dotnet-version: 8.0.x
    - name: Install DocFX
      run: dotnet tool install -g docfx
    - name: Build project (for XML docs)
      run: dotnet build AerospikeClient/AerospikeClient.csproj --configuration Release
    - name: Generate API documentation
      run: docfx docfx.json
    - name: Upload API docs artifact
      uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
      with:
        name: api-docs-${{ needs.build.outputs.version }}
        path: _site
        retention-days: 90

    - name: Checkout aerospike-websites
      if: ${{ !inputs.dry-run }}
      uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      with:
        repository: citrusleaf/aerospike-websites
        token: ${{ secrets.CLIENT_BOT_PAT }}
        path: aerospike-websites
        ref: main

    - name: Update C# API docs in aerospike-websites
      if: ${{ !inputs.dry-run }}
      run: |
        rm -rf aerospike-websites/apps/api/src/apidocs/csharp
        cp -r _site aerospike-websites/apps/api/src/apidocs/csharp

    - name: Create PR in aerospike-websites
      if: ${{ !inputs.dry-run }}
      working-directory: aerospike-websites
      env:
        GH_TOKEN: ${{ secrets.CLIENT_BOT_PAT }}
      run: |
        VERSION="${{ needs.build.outputs.version }}"
        BRANCH="update-csharp-apidocs-${VERSION}"

        git checkout -b "${BRANCH}"
        git add apps/api/src/apidocs/csharp
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git commit -m "Update C# client API docs to v${VERSION}"
        git push origin "${BRANCH}"

        gh pr create \
          --repo citrusleaf/aerospike-websites \
          --base main \
          --head "${BRANCH}" \
          --title "Update C# client API docs to v${VERSION}" \
          --body "Automated update of C# client API documentation to v${VERSION}.

        Generated by [aerospike-client-csharp release workflow](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})."

  deploy:
    if: ${{ !inputs.dry-run }}
    needs: [build, sign]
    uses: aerospike/shared-workflows/.github/workflows/reusable_deploy-artifacts.yaml@v3.0.0
    with:
      jf-project: database
      jf-build-name: aerospike-client-csharp
      jf-build-id: ${{ github.run_id }}
      jf-metadata-build-id: ${{ github.run_id }}-metadata
      version: ${{ needs.build.outputs.version }}
      gh-artifact-name: signed-artifacts
      gh-workflows-ref: v3.0.0
      oidc-provider-name: database-gh-aerospike
      oidc-audience: database-gh-aerospike

  create-release-bundle:
    if: ${{ !inputs.dry-run }}
    needs: [build, deploy]
    uses: aerospike/shared-workflows/.github/workflows/reusable_create-release-bundle.yaml@v3.0.0
    with:
      jf-project: database
      jf-build-names: "aerospike-client-csharp:${{ github.run_id }}"
      jf-bundle-name: aerospike-client-csharp
      version: ${{ needs.build.outputs.version }}
      gh-workflows-ref: v3.0.0
      oidc-provider-name: database-gh-aerospike
      oidc-audience: database-gh-aerospike

  create-github-release:
    if: ${{ !inputs.dry-run }}
    needs: [build, deploy, generate-api-docs]
    runs-on: ubuntu-latest
    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@df199fb7be9f65074067a9eb93f12bb4c5547cf2 # v2.13.3
      with:
        egress-policy: audit

    - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

    - name: Download API docs artifact
      uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
      with:
        name: api-docs-${{ needs.build.outputs.version }}
        path: api-docs

    - name: Zip API docs
      run: cd api-docs && zip -r ../aerospike-client-csharp-apidocs-${{ needs.build.outputs.version }}.zip .

    - name: Create GitHub Release
      uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.2.1
      with:
        tag_name: ${{ needs.build.outputs.version }}
        name: Aerospike C# Client v${{ needs.build.outputs.version }}
        generate_release_notes: true
        files: aerospike-client-csharp-apidocs-${{ needs.build.outputs.version }}.zip
