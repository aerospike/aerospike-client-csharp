name: Release
run-name: Build release artifacts and generate API docs

permissions:
  id-token: write
  contents: read

on:
  push:
    branches: ["master"]
  workflow_dispatch:
    inputs:
      dry-run:
        type: boolean
        required: false
        default: false
        description: 'Dry run: only build and generate API docs (skip sign, deploy, and release)'

jobs:
  build:
    runs-on: windows-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
      with:
        egress-policy: audit

    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Setup .NET
      uses: actions/setup-dotnet@baa11fbfe1d6520db94683bd5c7a3818018e4309 # v5.1.0
      with:
        dotnet-version: 8.0.x
    - name: Build artifacts
      uses: ./.github/actions/build
      with:
        sgKey: ${{ secrets.SG_KEY }}
    - name: Get version from nupkg
      id: get-version
      shell: pwsh
      run: |
        $nupkg = Get-ChildItem -Path AerospikeClient\bin\Release -Filter "Aerospike.Client.*.nupkg" | Where-Object { $_.Extension -eq ".nupkg" } | Select-Object -First 1
        $version = $nupkg.BaseName -replace '^Aerospike\.Client\.', ''
        echo "version=$version" >> $env:GITHUB_OUTPUT

  sign:
    if: ${{ !inputs.dry-run }}
    needs: build
    uses: aerospike/shared-workflows/.github/workflows/reusable_sign-artifacts.yaml@v3.0.0
    with:
      gh-unsigned-artifacts: AerospikeClient-${{ github.run_number }}
      gh-workflows-ref: v3.0.0
    secrets:
      gpg-private-key: ${{ secrets.GPG_SECRET_KEY }}
      gpg-public-key: ${{ secrets.GPG_PUBLIC_KEY }}
      gpg-key-pass: ${{ secrets.GPG_PASS }}
      es-username: ${{ secrets.ES_USERNAME }}
      es-password: ${{ secrets.ES_PASSWORD }}
      credential_id: ${{ secrets.CREDENTIAL_ID }}
      es-totp_secret: ${{ secrets.ES_TOTP_SECRET }}

  generate-api-docs:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
      with:
        egress-policy: audit

    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Setup .NET
      uses: actions/setup-dotnet@baa11fbfe1d6520db94683bd5c7a3818018e4309 # v5.1.0
      with:
        dotnet-version: 8.0.x
    - name: Install DocFX
      run: dotnet tool install -g docfx
    - name: Build project (for XML docs)
      run: dotnet build AerospikeClient/AerospikeClient.csproj --configuration Release
    - name: Set doc footer with version and commit
      run: |
        VERSION=$(echo "${{ needs.build.outputs.version }}" | sed 's/-[0-9]*$//')
        FOOTER="Aerospike C# Client v${VERSION} &#8226; ${{ github.sha }} &#8226; Copyright 2012-2026 Aerospike, Inc."
        jq --arg footer "$FOOTER" '.build.globalMetadata._appFooter = $footer' docfx.json > docfx.tmp && mv docfx.tmp docfx.json
    - name: Generate API documentation
      run: docfx docfx.json
    - name: Upload API docs artifact
      uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
      with:
        name: api-docs-${{ needs.build.outputs.version }}
        path: _site
        retention-days: 90

  deploy:
    if: ${{ !inputs.dry-run }}
    needs: [build, sign]
    uses: aerospike/shared-workflows/.github/workflows/reusable_deploy-artifacts.yaml@v3.0.0
    with:
      jf-project: database
      jf-build-name: aerospike-client-csharp
      jf-build-id: ${{ github.run_id }}
      jf-metadata-build-id: ${{ github.run_id }}-metadata
      version: ${{ needs.build.outputs.version }}
      gh-artifact-name: signed-artifacts
      gh-workflows-ref: v3.0.0
      oidc-provider-name: database-gh-aerospike
      oidc-audience: database-gh-aerospike

  create-release-bundle:
    if: ${{ !inputs.dry-run }}
    needs: [build, deploy]
    uses: aerospike/shared-workflows/.github/workflows/reusable_create-release-bundle.yaml@v3.1.1
    with:
      jf-project: database
      jf-build-names: "aerospike-client-csharp:${{ github.run_id }}"
      jf-bundle-name: aerospike-client-csharp
      version: ${{ needs.build.outputs.version }}
      gh-workflows-ref: v3.0.0
      oidc-provider-name: database-gh-aerospike
      oidc-audience: database-gh-aerospike
