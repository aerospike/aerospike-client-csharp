name: Test Run EE Server

permissions:
  id-token: write
  contents: read

on:
  push:
    branches: [chore/investigate-docker-permission-jfrog]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5

    - name: Set up JFrog credentials
      id: setup-jfrog-cli
      uses: jfrog/setup-jfrog-cli@v4
      env:
        JF_URL: https://aerospike.jfrog.io
        JF_PROJECT: database
      with:
        oidc-provider-name: database-gh-aerospike
        oidc-audience: database-gh-aerospike

    - name: Debug OIDC credentials
      run: |
        echo "OIDC User: ${{ steps.setup-jfrog-cli.outputs.oidc-user }}"
        echo "OIDC Token (first 20 chars): $(echo '${{ steps.setup-jfrog-cli.outputs.oidc-token }}' | cut -c1-20)..."
        echo "Docker config before login:"
        cat /home/runner/.docker/config.json || echo "No docker config found"
      shell: bash

    - name: Docker login
      run: docker login artifact.aerospike.io --username ${{ steps.setup-jfrog-cli.outputs.oidc-user }} --password ${{ steps.setup-jfrog-cli.outputs.oidc-token }}
      shell: bash

    # to do the check it needs admin :/
    # - name: Check JFrog permissions
    #   run: |
    #     echo "Checking JFrog access token permissions:"
    #     jf rt curl -XGET /api/security/permissions 2>&1 || echo "Permission check failed"
    #     echo ""
    #     echo "Checking Docker registry access:"
    #     jf docker pull artifact.aerospike.io/database-container-prod-public-local/aerospike-server-enterprise:latest --build-name=test --build-number=1 2>&1 || echo "Docker pull via JFrog CLI failed"
    #   shell: bash
    #   continue-on-error: true

    - name: Set image name
      run: echo IMAGE_NAME=artifact.aerospike.io/database-container-prod-public-local/aerospike-server-enterprise:latest >> $GITHUB_ENV
      shell: bash

    - name: Run Docker container and wait for cake
      run: |
        docker run -d --name aerospike -p 3000:3000 ${{ env.IMAGE_NAME }}
        echo "Waiting for 'cake' to appear in server logs (timeout: 30 seconds)..."
        echo "Reference: https://aerospike.com/docs/database/install/upgrade/standard/#monitor-the-cluster-state"
        set +o pipefail
        timeout 30 docker logs -f aerospike 2>&1 | grep -m 1 "cake" > /dev/null
        GREP_EXIT=${PIPESTATUS[1]}
        TIMEOUT_EXIT=${PIPESTATUS[0]}
        if [ $GREP_EXIT -eq 0 ]; then
          echo "Found 'cake' in logs - server is ready"
        else
          echo "ERROR: 'cake' did not appear in server logs (grep exit: $GREP_EXIT, timeout exit: $TIMEOUT_EXIT)"
          echo "Current server logs:"
          docker logs aerospike
          exit 1
        fi
        set -o pipefail
      shell: bash

    # not sure about this step here but included since the original tests have it.
    - name: Wait for server to start
      run: timeout 30 bash ./.github/workflows/wait-for-as-server-to-start.bash aerospike false true || true
      shell: bash

