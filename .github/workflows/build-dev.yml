name: Build and test dev
run-name: Build artifacts and run dev branch tests (server-tag=${{ inputs.server-tag }})

permissions:
  # This is required for requesting the OIDC token
  id-token: write
  contents: read

# Trigger test workflow whenever:
# 1. Commits are pushed directly to a CLIENT branch
# 2. Pull requests to stage branch are updated
on:
  push:
    branches: ["CLIENT*"]
  pull_request:
    branches: ["stage"]
    types: [
      # Default triggers
      opened,
      synchronize,
      reopened,
      # Additional triggers
      labeled,
      unlabeled
    ]
  workflow_dispatch:
    inputs:
      server-tag:
        type: string
        required: false
        default: "latest"
        description: "Server docker image tag"
      run-tests:
        type: boolean
        required: false
        default: false
        description: Spin up aerospike enterprise server and run tests
      server-type:
        type: string
        required: false
        default: "aerospike-server-enterprise"

env:
  SHARED_WORKFLOWS_REF: v3.0.0
  JF_PROJECT: database
  VERSION: ${{ github.run_number }}

jobs:
  build:
    runs-on: windows-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
    steps:
    - uses: actions/checkout@v5
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 8.0.x
    - name: Build artifacts
      uses: ./.github/actions/build
      with:
        sgKey: ${{ secrets.SG_KEY }}
    - name: Get version from nupkg
      id: get-version
      shell: pwsh
      run: |
        Write-Host "Listing all files in AerospikeClient\bin\Release:"
        Get-ChildItem -Path AerospikeClient\bin\Release | ForEach-Object { Write-Host $_.Name }
        Write-Host ""
        Write-Host "Looking for nupkg files:"
        $nupkgs = Get-ChildItem -Path AerospikeClient\bin\Release -Filter "*.nupkg"
        $nupkgs | ForEach-Object { Write-Host $_.Name }
        $nupkg = $nupkgs | Where-Object { $_.Name -notlike "*.snupkg" } | Select-Object -First 1
        Write-Host ""
        Write-Host "Selected nupkg: $($nupkg.Name)"
        $version = $nupkg.Name -replace 'Aerospike\.Client\.(.*)\.nupkg', '$1'
        Write-Host "Extracted version: $version"
        echo "version=$version" >> $env:GITHUB_OUTPUT

  sign:
    needs: build
    uses: aerospike/shared-workflows/.github/workflows/reusable_sign-artifacts.yaml@v3.0.0
    with:
      gh-unsigned-artifacts: AerospikeClient-${{ github.run_number }}
      gh-workflows-ref: v3.0.0
    secrets:
      gpg-private-key: ${{ secrets.GPG_SECRET_KEY }}
      gpg-public-key: ${{ secrets.GPG_PUBLIC_KEY }}
      gpg-key-pass: ${{ secrets.GPG_PASS }}
      es-username: ${{ secrets.ES_USERNAME }}
      es-password: ${{ secrets.ES_PASSWORD }}
      credential_id: ${{ secrets.CREDENTIAL_ID }}
      es-totp_secret: ${{ secrets.ES_TOTP_SECRET }}

  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - name: Test
      uses: ./.github/actions/test
      with:
        server-tag: ${{ inputs.server-tag || 'latest' }}
        server-type: ${{ inputs.server-type || 'aerospike-server-enterprise' }}
        oidc-provider: database-gh-aerospike
        oidc-audience: database-gh-aerospike

  create-release-bundle:
    needs: [sign, test]
    uses: aerospike/shared-workflows/.github/workflows/reusable_create-release-bundle.yaml@v3.0.0
    with:
      jf-project: database
      jf-build-names: "aerospike-client-csharp:${{ github.run_id }}"
      jf-bundle-name: aerospike-client-csharp
      version: ${{ needs.build.outputs.version }}
      gh-workflows-ref: v3.0.0
      oidc-provider-name: database-gh-aerospike
      oidc-audience: database-gh-aerospike
  
  deploy:
    needs: create-release-bundle
    uses: aerospike/shared-workflows/.github/workflows/reusable_deploy-artifacts.yaml@v3.0.0
    with:
      jf-project: database
      jf-build-name: aerospike-client-csharp
      jf-build-id: ${{ github.run_id }}
      jf-metadata-build-id: ${{ github.run_id }}-metadata
      version: ${{ needs.build.outputs.version }}
      gh-artifact-name: signed-artifacts
      gh-workflows-ref: v3.0.0
      oidc-provider-name: database-gh-aerospike
      oidc-audience: database-gh-aerospike

  
