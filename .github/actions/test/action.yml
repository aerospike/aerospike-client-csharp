name: Test

inputs:
  server-tag:
    required: false
    default: latest
    description: Server docker image tag
  oidc-provider:
    required: true
    description: OIDC provider
  oidc-audience:
    required: true
    description: OIDC audience
  server-container-repo:
    required: false
    default: database-docker-virtual/aerospike-server-enterprise
    description: Server container repository path (e.g., database-docker-virtual/aerospike-server-enterprise)
  enable-strong-consistency:
    required: false
    default: "true"
    description: Enable strong consistency (`true` or `false`)
  features-content:
    required: false
    default: ""
    description: Raw features.conf content (e.g., from a secret)

runs:
  using: composite
  steps:
    - name: Setup Aerospike server
      uses: aerospike/shared-workflows/.github/actions/setup-aerospike-server@CLIENT-4213
      with:
        server-tag: ${{ inputs.server-tag }}
        server-container-repo: ${{ inputs.server-container-repo }}
        oidc-provider: ${{ inputs.oidc-provider }}
        oidc-audience: ${{ inputs.oidc-audience }}
        enable-strong-consistency: ${{ inputs.enable-strong-consistency }}
        features-content: ${{ inputs.features-content }}

    - name: Download test artifacts
      uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
      with:
        name: AerospikeTest-${{ github.run_number }}
        path: artifacts

    - name: Unzip tests
      shell: bash
      working-directory: artifacts
      run: unzip AerospikeTest*.zip

    - name: Test
      shell: bash
      run: dotnet exec ./artifacts/publish/AerospikeTest.dll --settings ./.runsettings

    - name: Show logs if failed
      shell: bash
      if: ${{ failure() }}
      run: |
        docker container logs aerospike-1
