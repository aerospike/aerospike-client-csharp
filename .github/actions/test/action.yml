name: Test

inputs:
  jfrog-tests-repo-name:
    description: Where to download the test program from
    required: false
    default: database-generic-dev-local
  server-tag:
    required: false
    default: latest
    description: Server docker image tag
  oidc-provider:
    required: true
    description: OIDC provider
  oidc-audience:
    required: true
    description: OIDC audience
  server-type:
    required: true
    description: Server type aerospike-server or aerospike-server-enterprise

runs:
  using: composite
  steps:
    - name: Run EE server
      uses: ./.github/actions/run-ee-server
      with:
        server-tag: ${{ inputs.server-tag }}
        server-type: ${{ inputs.server-type }}
        oidc-provider: ${{ inputs.oidc-provider }}
        oidc-audience: ${{ inputs.oidc-audience }}
        strong-consistency: 1
   
    - name: Download test artifacts
      uses: actions/download-artifact@v4
      with:
        name: AerospikeTest-${{ github.run_number }}
        path: artifacts

    - name: Unzip tests
      shell: bash
      working-directory: artifacts
      run: unzip AerospikeTest*.zip
    
    - name: Test
      shell: bash
      run: dotnet exec ./artifacts/publish/AerospikeTest.dll --settings ./.runsettings
    
    - name: Show logs if failed
      shell: bash
      if: ${{ failure() }}
      run: |
        docker container logs aerospike
        cat ./configs/aerospike.conf
