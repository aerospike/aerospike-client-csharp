name: Run EE Server
description: Run EE server. Returns once server is ready. Only tested on Linux and macOS
# NOTE: do not share this server container with others
# since it's using the default admin / admin credentials
inputs:
  # All inputs in composite actions are strings
  server-tag:
    description: Server version to use
    required: false
    default: latest
  container-repo-url:
    required: false
    description: Container repo url
    default: artifact.aerospike.io
  jfrog-platform-url:
    description: JFrog platform url. If empty and server-image is provided, parsed from server-image hostname. Otherwise defaults to https://aerospike.jfrog.io
    required: false
    default: ""
  oidc-provider:
    description: OIDC provider name
    required: true
  oidc-audience:
    description: OIDC audience
    required: true
  container-name:
    default: aerospike
    required: false
    description: Name for test container
  server-type:
    required: false
    default: aerospike-server-enterprise
    description: Server type `aerospike-server` or `aerospike-server-enterprise`
  strong-consistency:
    required: false
    default: "1"
    description: Enable strong consistency (1 or 0)
  security:
    required: false
    default: "0"
    description: Enable security (1 or 0)
  server-image:
    required: false
    default: ""
    description: Custom full docker image name (e.g., aerospike.jfrog.io/database-docker-virtual/aerospike-server-enterprise:8.1.1.0-rc27_1). Overrides container-repo-url, server-type, and server-tag if provided.

runs:
  using: composite
  steps:
  - name: Resolve JFrog platform URL and container repo URL
    id: resolve-urls
    run: |
      if [ -n "${{ inputs.server-image }}" ]; then
        IMAGE_HOSTNAME=$(echo "${{ inputs.server-image }}" | cut -d'/' -f1)
      fi

      if [ -n "${{ inputs.jfrog-platform-url }}" ]; then
        echo "jfrog-platform-url=${{ inputs.jfrog-platform-url }}" >> $GITHUB_OUTPUT
      elif [ -n "${IMAGE_HOSTNAME}" ]; then
        echo "jfrog-platform-url=https://${IMAGE_HOSTNAME}" >> $GITHUB_OUTPUT
      else
        echo "jfrog-platform-url=https://aerospike.jfrog.io" >> $GITHUB_OUTPUT
      fi

      if [ -n "${IMAGE_HOSTNAME}" ]; then
        echo "container-repo-url=${IMAGE_HOSTNAME}" >> $GITHUB_OUTPUT
      else
        echo "container-repo-url=${{ inputs.container-repo-url }}" >> $GITHUB_OUTPUT
      fi
    shell: bash

  - name: Set up JFrog credentials
    id: setup-jfrog-cli
    uses: step-security/setup-jfrog-cli@a6b41f8338bea0983ddff6bd4ede7d2dcd81e1fa # v4.8.1
    env:
      JF_URL: ${{ steps.resolve-urls.outputs.jfrog-platform-url }}
      JF_PROJECT: database
    with:
      oidc-provider-name: ${{ inputs.oidc-provider }}
      oidc-audience: ${{ inputs.oidc-audience }}

  - name: Docker login to container repo
    run: docker login ${{ steps.resolve-urls.outputs.container-repo-url }} --username ${{ steps.setup-jfrog-cli.outputs.oidc-user }} --password ${{ steps.setup-jfrog-cli.outputs.oidc-token }}
    shell: bash

  - name: Set image name
    run: |
      if [ -n "${{ inputs.server-image }}" ]; then
        echo IMAGE_FULL_NAME=${{ inputs.server-image }} >> $GITHUB_ENV
      else
        echo IMAGE_FULL_NAME=${{ inputs.container-repo-url }}/docker/${{ inputs.server-type }}:${{ inputs.server-tag }} >> $GITHUB_ENV
      fi
    shell: bash

  - name: Run EE server setup script
    run: STRONG_CONSISTENCY=${{ inputs.strong-consistency }} SECURITY=${{ inputs.security }} bash ./run-ee-server.bash
    working-directory: .github/workflows/docker-setup
    shell: bash
    env:
      CONTAINER_NAME: ${{ inputs.container-name }}

  - run: docker logs ${{ inputs.container-name }}
    shell: bash
